name: Minify and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  minify-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install html-minifier
        run: npm install -g html-minifier

      - name: Minify index.html
        run: |
          mkdir -p dist
          html-minifier \
            --collapse-whitespace \
            --remove-comments \
            --remove-optional-tags \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --remove-tag-whitespace \
            --minify-css true \
            --minify-js true \
            --input-dir . \
            --output-dir dist \
            --file-ext html \
            index.html

      - name: Copy other files to dist
        run: |
          cp CNAME dist/ 2>/dev/null || true
          cp sitemap.xml dist/ 2>/dev/null || true
          cp enviz-logo.png dist/ 2>/dev/null || true
          cp favicon.png dist/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4